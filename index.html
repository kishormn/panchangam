<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iyengar Monthly Public Panchangam</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fcfcfc; padding: 15px; text-align: center; color: #333; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid #d32f2f; }
        h1 { color: #d32f2f; font-size: 24px; margin-bottom: 5px; }
        .picker-section { background: #f9f9f9; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid #eee; text-align: left; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media(max-width: 600px) { .picker-section { grid-template-columns: 1fr; } }
        label { font-weight: bold; font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
        .select-style, input[type="month"] { width: 100%; padding: 10px; font-size: 15px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-calc { background: #d32f2f; color: white; border: none; padding: 14px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        .status-msg { font-size: 13px; color: #666; font-style: italic; text-align: center; grid-column: 1 / -1; margin-top: 5px; }
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 25px; display: none; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th, td { padding: 12px 10px; border: 1px solid #ddd; vertical-align: top; }
        th { background-color: #d32f2f; color: white; font-weight: bold; }
        tr:nth-child(even) { background-color: #fdfaf4; }
        .sankalpam-text { font-size: 11px; color: #666; background: #fffde7; padding: 6px; border-radius: 4px; border: 1px dashed #e0d090; max-height: 80px; overflow-y: auto; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h1>🕉️ Iyengar Monthly Public Panchangam</h1>
    <p style="color:#666; font-size: 14px; margin-top: 0;">Full Month Almanac Calendar Display Grid</p>
    
    <div class="picker-section">
        <div>
            <label for="editionSelect">📖 SELECT PANCHANGAM EDITION / EDITION:</label>
            <select id="editionSelect" class="select-style" onchange="handleEditionChange()">
                <option value="ontikoppal">Ontikoppal Panchanga (T.N. Krishnaiah Shetty)</option>
                <option value="srirangam">Srirangam Vakya Panchangam</option>
                <option value="ahobila">Ahobila Mutt Panchangam Edition</option>
                <option value="drigganitha">Pure Drigganitha Modern Engine</option>
            </select>
        </div>

        <div>
            <label for="monthPicker">📅 SELECT TARGET MONTH & YEAR:</label>
            <input type="month" id="monthPicker" value="2026-05">
        </div>

        <div style="grid-column: 1 / -1;">
            <label for="citySelect">📍 TARGET GEOGRAPHY LOCATION:</label>
            <select id="citySelect" class="select-style" onchange="handleCityChange()">
                <option value="12.9716,77.5946">Bengaluru (Default)</option>
                <option value="13.0827,80.2707">Chennai (Madras)</option>
                <option value="10.8606,78.6882">Srirangam / Trichy</option>
                <option value="11.9416,79.8083">Kanchipuram</option>
                <option value="12.1207,76.6710">Melukote / Mysore</option>
            </select>
        </div>

        <div id="statusMessage" class="status-msg">Configuration: ONTIKOPPAL Mode | Bengaluru</div>
    </div>

    <button class="btn-calc" onclick="generateMonthlyPanchangam()">Generate Full Month Almanac Table</button>

    <div id="tableContainer" class="table-responsive">
        <h3 id="tableHeader" style="color: #d32f2f; text-align: left; margin-bottom: 15px; border-bottom: 2px solid #d32f2f; padding-bottom: 5px;"></h3>
        <table>
            <thead>
                <tr>
                    <th style="width: 10%;">Date / Day</th>
                    <th style="width: 12%;">Tamil Month</th>
                    <th style="width: 13%;">Paksham</th>
                    <th style="width: 20%;">Thithi Details</th>
                    <th style="width: 20%;">Nakshatram Details</th>
                    <th style="width: 25%;">Daily Sankalpam Script</th>
                </tr>
            </thead>
            <tbody id="calendarBody">
                <!-- Data cells get dynamically loaded here -->
            </tbody>
        </table>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
